{% extends "base.html" %}

{% block content %}
    <div class="form-card">
    <h1>Login</h1>

    <form method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ email or '' }}" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="button">Login</button>
    </form>
</div>
{% endblock %}
